name: auto-update

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 0 * * *"

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.AUTO_UPDATE_TOKEN }}

      - name: Tag latest patch releases of Erlang/OTP 25-29
        env:
          GITHUB_API_TOKEN: ${{ secrets.LAST_VERSION_TOKEN }}
        run: |
          pip3 install -U lastversion

          git config user.name github-actions
          git config user.email github-actions@github.com

          for major in 25 26 27 28 29; do
            version="$(lastversion -b "${major}" erlang || true)"
            if [ -z "${version}" ]; then
              echo "No release found for Erlang/OTP ${major}, skipping"
              continue
            fi

            tag="v${version}"
            echo "Latest Erlang/OTP ${major} is ${version}"

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists, skipping"
              continue
            fi

            echo "Creating new tag ${tag}"
            git tag "${tag}"
            git push origin "${tag}"
          done
